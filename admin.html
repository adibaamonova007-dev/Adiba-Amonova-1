<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.section{
margin-top:30px;
padding-top:20px;
border-top:1px solid #ddd;
}

#dashboard{
display:block;
}


</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Enter admin password">
<button onclick="login()">Login</button>

<div id="dashboard" style="display:block;">

<h2>Admin Dashboard</h2>

<div class="section">

<h3>Post Announcement</h3>

<input type="text" id="announcement" placeholder="Write announcement">
<button onclick="publish()">Publish</button>

<p id="result"></p>

</div>


<div class="section">

<h3>Upload Reading Test</h3>

<input type="file" id="readingFile">
<button onclick="uploadReading()">Upload Reading</button>

</div>


<div class="section">

<h3>Upload Listening Test</h3>

<input type="file" id="listeningFile">
<button onclick="uploadListening()">Upload Listening</button>

</div>


<div class="section">

<h3>Upload Mock Test</h3>

<input type="file" id="mockFile">
<button onclick="uploadMock()">Upload Mock Test</button>

</div>


</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

function login(){

let pass=document.getElementById("password").value

if(pass==="admin123"){

document.getElementById("dashboard").style.display="block"

}else{

alert("Wrong password")

}

}


function publish(){

let text=document.getElementById("announcement").value

localStorage.setItem("announcement",text)

document.getElementById("result").innerText="Announcement saved!"

}


const supabase = window.supabase.createClient(

"https://YOUR_PROJECT_ID.supabase.co",
"YOUR_ANON_PUBLIC_KEY"

)



async function uploadReading(){

const file=document.getElementById("readingFile").files[0]

const {data,error}=await supabase.storage
.from("reading-tests")
.upload(file.name,file)

if(error){

alert("Upload failed")

}else{

alert("Reading test uploaded!")

}

}



async function uploadListening(){

const file=document.getElementById("listeningFile").files[0]

const {data,error}=await supabase.storage
.from("listening-tests")
.upload(file.name,file)

if(error){

alert("Upload failed")

}else{

alert("Listening uploaded!")

}

}



async function uploadMock(){

const file=document.getElementById("mockFile").files[0]

const {data,error}=await supabase.storage
.from("mock-tests")
.upload(file.name,file)

if(error){

alert("Upload failed")

}else{

alert("Mock test uploaded!")

}

}

</script>

</body>
</html>
